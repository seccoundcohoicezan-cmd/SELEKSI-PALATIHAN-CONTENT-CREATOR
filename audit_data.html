<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audit Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>

<body class="bg-slate-50 min-h-screen">

<div id="login" class="flex items-center justify-center min-h-screen">
  <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">
    <h2 class="text-xl font-bold mb-4">Login Admin</h2>
    <input id="pass" type="password" placeholder="Password" class="w-full border p-3 rounded mb-3">
    <button onclick="login()" class="w-full bg-black text-white p-3 rounded">Masuk</button>
    <p id="err" class="text-red-500 mt-2 hidden">Salah</p>
  </div>
</div>

<div id="app" class="hidden p-6">
  <div class="flex justify-between mb-4">
    <input id="search" placeholder="Search..." class="border p-2 rounded w-1/2">
    <button onclick="loadData()" class="bg-black text-white px-4 py-2 rounded">Refresh</button>
  </div>

  <table class="w-full border text-sm">
    <thead class="bg-gray-100">
      <tr>
        <th class="p-2">Nama</th>
        <th class="p-2">WA</th>
        <th class="p-2">Sekolah</th>
        <th class="p-2">Guru</th>
        <th class="p-2">No Guru</th>
        <th class="p-2">Status</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
const PASSWORD = "606";
const SHEET = "https://docs.google.com/spreadsheets/d/1GACkosX_swAQolI6tjjaxefAATEcOJ5fEEKIBntDxAI/export?format=csv";

let data = [];

function login(){
  if(document.getElementById("pass").value === PASSWORD){
    document.getElementById("login").style.display="none";
    document.getElementById("app").classList.remove("hidden");
    loadData();
  } else {
    document.getElementById("err").classList.remove("hidden");
  }
}

function extractPhone(text){
  const m = text.match(/(08\d{8,15})/);
  return m ? m[1] : "-";
}

function loadData(){
  fetch(SHEET)
    .then(res=>res.text())
    .then(csv=>{
      const parsed = Papa.parse(csv,{header:true});
      data = parsed.data;
      render(data);
    });
}

function render(rows){
  const tbody = document.getElementById("tbody");
  tbody.innerHTML="";
  rows.forEach(r=>{
    const guruRaw = r["Pihak Guru yang Mengajak Kamu Daftar"] || "";
    tbody.innerHTML += `
      <tr class="border-t">
        <td class="p-2">${r["Nama"]||"-"}</td>
        <td class="p-2">${r["No Whatsapp Aktif"]||"-"}</td>
        <td class="p-2">${r["Asal Sekolah"]||"-"}</td>
        <td class="p-2">${guruRaw.replace(/08\d+/,'')}</td>
        <td class="p-2">${extractPhone(guruRaw)}</td>
        <td class="p-2">${r["STATUS"]||"-"}</td>
      </tr>`;
  });
}

document.getElementById("search").addEventListener("input",e=>{
  const q = e.target.value.toLowerCase();
  render(data.filter(d=>JSON.stringify(d).toLowerCase().includes(q)));
});
</script>

</body>
</html>
