<script>
  const SHEET_ID = '1GACkosX_swAQolI6tjjaxefAATEcOJ5fEEKIBntDxAI';
  const SHEET_GID = '0';

  const CSV_URLS = [
    `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${SHEET_GID}`,
    `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${SHEET_GID}`
  ];

  let participants = [];

  const tableBody = document.getElementById('tableBody');
  const tableWrapper = document.getElementById('tableWrapper');
  const searchInput = document.getElementById('searchInput');
  const statusFilter = document.getElementById('statusFilter');
  const emptyState = document.getElementById('emptyState');
  const loadingState = document.getElementById('loadingState');
  const errorState = document.getElementById('errorState');
  const errorMessage = document.getElementById('errorMessage');
  const refreshButton = document.getElementById('refreshButton');
  const lastUpdatedText = document.getElementById('lastUpdatedText');

  function normalizeStatus(value) {
    return (value || '').toString().trim().toUpperCase() || 'TANPA STATUS';
  }

  function escapeHtml(text) {
    return (text ?? '')
      .toString()
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function getStatusStyle(status) {
    if (status === 'LOLOS') {
      return {
        badge: 'bg-emerald-50 text-emerald-700 ring-emerald-200',
        icon: '<svg class="w-3.5 h-3.5 fill-emerald-500 text-white" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" /></svg>'
      };
    }
    return {
      badge: 'bg-amber-50 text-amber-700 ring-amber-200',
      icon: '<svg class="w-3.5 h-3.5 fill-amber-500 text-white" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" /></svg>'
    };
  }

  function mapRow(row) {
    const nama = (row['Nama'] || '').toString().trim();
    if (!nama) return null;

    return {
      nama,
      kontak: (row['No Whatsapp Aktif'] || '-').toString().trim(),
      sekolah: (row['Asal Sekolah'] || '-').toString().trim(),
      kelas: (row['Kelas'] || '-').toString().trim(),
      guru: (row['Pihak Guru yang Mengajak Kamu Daftar'] || '-').toString().trim(),
      status: normalizeStatus(row['STATUS'])
    };
  }

  function deduplicateParticipants(data) {
    const seen = new Set();

    return data.filter(item => {
      const key = [
        item.nama.toLowerCase(),
        item.kontak.toLowerCase(),
        item.sekolah.toLowerCase(),
        item.kelas.toLowerCase()
      ].join('|');

      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    });
  }

  function updateStats(data) {
    const uniqueSchools = new Set(
      data
        .map(item => item.sekolah)
        .filter(s => s && s !== '-')
    );

    const lolosCount = data.filter(item => item.status === 'LOLOS').length;

    document.getElementById('stat-total').innerText = data.length;
    document.getElementById('stat-lolos').innerText = lolosCount;
    document.getElementById('stat-lainnya').innerText = data.length - lolosCount;
    document.getElementById('stat-sekolah').innerText = uniqueSchools.size;
  }

  function updateStatusOptions(data) {
    const dynamicStatuses = [...new Set(data.map(item => item.status).filter(Boolean))].sort();
    const statuses = ['Semua', ...dynamicStatuses];
    const currentValue = statusFilter.value || 'Semua';

    statusFilter.innerHTML = statuses
      .map(status => `<option value="${escapeHtml(status)}">${escapeHtml(status === 'Semua' ? 'Semua Status' : status)}</option>`)
      .join('');

    statusFilter.value = statuses.includes(currentValue) ? currentValue : 'Semua';
  }

  function renderTable() {
    const searchTerm = searchInput.value.toLowerCase().trim();
    const filterValue = statusFilter.value || 'Semua';

    const filtered = participants.filter(item => {
      const haystack = [
        item.nama,
        item.kontak,
        item.sekolah,
        item.kelas,
        item.guru,
        item.status
      ].join(' ').toLowerCase();

      const matchesSearch = haystack.includes(searchTerm);
      const matchesFilter = filterValue === 'Semua' || item.status === filterValue;

      return matchesSearch && matchesFilter;
    });

    tableBody.innerHTML = '';
    updateStats(filtered);

    if (filtered.length === 0) {
      tableWrapper.classList.add('hidden');
      emptyState.classList.remove('hidden');
      return;
    }

    emptyState.classList.add('hidden');
    tableWrapper.classList.remove('hidden');

    filtered.forEach(item => {
      const style = getStatusStyle(item.status);

      const row = `
        <tr class="hover:bg-slate-50/80 transition-all cursor-default align-top">
          <td class="px-8 py-6">
            <div class="font-bold text-slate-800 text-base">${escapeHtml(item.nama)}</div>
            <div class="text-xs text-slate-400 font-medium mt-1">${escapeHtml(item.kontak)}</div>
          </td>
          <td class="px-8 py-6">
            <div class="text-sm font-bold text-slate-700">${escapeHtml(item.sekolah)}</div>
            <div class="text-xs text-slate-400 font-medium mt-1">Kelas ${escapeHtml(item.kelas || '-')}</div>
          </td>
          <td class="px-8 py-6">
            <div class="text-sm text-slate-500 font-medium max-w-xs leading-relaxed">${escapeHtml(item.guru || '-')}</div>
          </td>
          <td class="px-8 py-6">
            <span class="inline-flex items-center gap-1.5 px-4 py-1.5 rounded-full ${style.badge} text-xs font-black ring-1 whitespace-nowrap">
              ${style.icon} ${escapeHtml(item.status)}
            </span>
          </td>
        </tr>
      `;

      tableBody.insertAdjacentHTML('beforeend', row);
    });
  }

  async function fetchCsvText() {
    let lastError = null;

    for (const url of CSV_URLS) {
      try {
        const response = await fetch(url, {
          method: 'GET',
          cache: 'no-store'
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const text = await response.text();

        if (!text || text.trim().length < 10) {
          throw new Error('Respons kosong dari spreadsheet');
        }

        // Cegah kasus ketika yang terambil bukan CSV, tapi halaman HTML login/error
        const looksLikeHtml = /<!DOCTYPE html>|<html|<head|<body/i.test(text);
        if (looksLikeHtml) {
          throw new Error('Spreadsheet tidak mengembalikan CSV. Biasanya karena akses file belum publik.');
        }

        return text;
      } catch (err) {
        lastError = err;
      }
    }

    throw lastError || new Error('Gagal mengambil CSV dari spreadsheet');
  }

  async function loadSpreadsheetData() {
    loadingState.classList.remove('hidden');
    errorState.classList.add('hidden');
    emptyState.classList.add('hidden');
    tableWrapper.classList.add('hidden');

    refreshButton.disabled = true;
    refreshButton.classList.add('opacity-60', 'cursor-not-allowed');

    try {
      const csvText = await fetchCsvText();

      const parsed = Papa.parse(csvText, {
        header: true,
        skipEmptyLines: true,
        transformHeader: header => (header || '').toString().trim()
      });

      if (parsed.errors && parsed.errors.length > 0) {
        console.warn('CSV parse warnings:', parsed.errors);
      }

      let data = parsed.data
        .map(mapRow)
        .filter(Boolean);

      data = deduplicateParticipants(data);
      participants = data;

      updateStatusOptions(participants);
      renderTable();

      const now = new Date();
      lastUpdatedText.textContent = `Terakhir dimuat: ${now.toLocaleString('id-ID')}`;
    } catch (error) {
      console.error(error);

      participants = [];
      updateStatusOptions([]);
      updateStats([]);

      errorState.classList.remove('hidden');
      errorMessage.textContent =
        'Gagal mengambil data spreadsheet. Pastikan Google Sheet diatur ke "Anyone with the link can view" atau "Publish to web". Detail: ' +
        error.message;
    } finally {
      loadingState.classList.add('hidden');
      refreshButton.disabled = false;
      refreshButton.classList.remove('opacity-60', 'cursor-not-allowed');
    }
  }

  searchInput.addEventListener('input', renderTable);
  statusFilter.addEventListener('change', renderTable);
  refreshButton.addEventListener('click', loadSpreadsheetData);

  updateStatusOptions([]);
  loadSpreadsheetData();
</script>
